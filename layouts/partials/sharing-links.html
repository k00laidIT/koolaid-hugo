{{ with .Params.sharingLinks | default (.Site.Params.article.sharingLinks | default false) }}
  {{ $links := site.Data.sharing }}
  <section class="pt-4">
    <details>
      <summary class="inline-flex items-center gap-1.5 rounded border border-neutral-300 bg-neutral-100 px-2 py-1 text-xs text-neutral-600 hover:bg-neutral-200 dark:border-neutral-600 dark:bg-neutral-800 dark:text-neutral-400 dark:hover:bg-neutral-700 cursor-pointer list-none w-fit">
        {{ partial "icon.html" "share" }}<span>Share</span>
      </summary>
      <div class="flex flex-row flex-wrap mt-2 text-xl">
      {{ range . }}
        {{ with index $links . }}
          <a
            target="_blank"
            class="m-1 rounded bg-neutral-300 p-1.5 text-neutral-700 hover:bg-primary-500 hover:text-neutral dark:bg-neutral-700 dark:text-neutral-300 dark:hover:bg-primary-400 dark:hover:text-neutral-800"
            href="{{ printf .url $.Permalink $.Title }}"
            title="{{ i18n .title }}"
            aria-label="{{ i18n .title }}">
            {{ partial "icon.html" .icon }}
          </a>
        {{ end }}
      {{ end }}
      </div>
    </details>
  </section>
{{ end }}
